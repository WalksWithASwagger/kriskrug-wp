name: Sync Projects

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Report parked project sync status
        run: |
          echo "Project sync is intentionally parked."
          echo "This workflow is manual, read-only, and kept only so the old workflow name remains discoverable."
          echo "It does not add issues or pull requests to a project board, update project fields, or interpret auto-implement labels."
