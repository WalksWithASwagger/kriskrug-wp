name: Test PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # Basic validation checks
  validate:
    runs-on: ubuntu-latest
    outputs:
      has_php: ${{ steps.changed-files.outputs.has_php }}
      has_docs: ${{ steps.changed-files.outputs.has_docs }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Detect changed file types
        id: changed-files
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const names = files.map((f) => f.filename);
            const hasPhp = names.some((name) => name.endsWith('.php'));
            const hasDocs = names.some((name) =>
              name.endsWith('.md') ||
              name.startsWith('docs/') ||
              ['AGENTS.md', 'README.md', 'CONTRIBUTING.md', 'Makefile', 'scripts/docs_truth_check.py'].includes(name)
            );
            core.info(`Changed files: ${names.length}`);
            core.info(`has_php=${hasPhp} has_docs=${hasDocs}`);
            core.setOutput('has_php', hasPhp ? 'true' : 'false');
            core.setOutput('has_docs', hasDocs ? 'true' : 'false');

      - name: Check PR title format
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title;

            const validPrefixes = ['Fix:', 'Add:', 'Update:', 'Refactor:', 'Docs:', 'Chore:', 'Feature:'];
            const hasValidPrefix = validPrefixes.some(prefix => title.startsWith(prefix));

            if (!hasValidPrefix) {
              core.warning(`PR title should start with one of: ${validPrefixes.join(', ')}`);
            }

      - name: Check PR links to issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            const hasIssueLink = /(?:fixes|closes|resolves)\s+#\d+/i.test(body);

            if (!hasIssueLink) {
              core.warning('PR should link to an issue using "Fixes #123" or similar');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `⚠️ **Missing Issue Link**\n\nThis PR doesn't appear to link to an issue.\n\nPlease add a line like:\n- \`Fixes #123\`\n- \`Closes #456\`\n- \`Resolves #789\`\n\nThis ensures the issue is automatically closed when the PR is merged.`
              });
            }

  # WordPress/PHP validation
  php-validation:
    needs: validate
    runs-on: ubuntu-latest
    if: needs.validate.outputs.has_php == 'true'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install PHP validation dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: WordPress PHP validation
        run: make validate

      - name: Plugin smoke tests
        run: make plugin-smoke

  # Complete Python gate: publisher, operational, SEO inventory, SEO backfill/link safety
  python-tests:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install Python test dependencies
        run: pip install -r requirements-test.txt

      - name: Run complete Python gate
        run: make python-test PYTHON=python

  # JavaScript/Node validation
  javascript-validation:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Check JavaScript syntax
        run: make javascript-syntax

  # Documentation truth guardrails
  docs-truth-check:
    needs: validate
    runs-on: ubuntu-latest
    if: needs.validate.outputs.has_docs == 'true'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Check docs for stale current-state claims
        run: python3 scripts/docs_truth_check.py

  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Summarize all checks
  summary:
    needs: [validate, php-validation, python-tests, javascript-validation, docs-truth-check, security-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all validations passed
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const jobs = ${{ toJSON(needs) }};

            const allPassed = Object.values(jobs).every(job =>
              job.result === 'success' || job.result === 'skipped'
            );

            if (allPassed) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `✅ **All validation checks passed!**\n\nThis PR is ready for human review.`
              });
            } else {
              const failedJobs = Object.entries(jobs)
                .filter(([_, job]) => job.result === 'failure')
                .map(([name, _]) => name);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `❌ **Some validation checks failed**\n\nFailed checks:\n${failedJobs.map(j => `- ${j}`).join('\n')}\n\nPlease fix the issues and push again.`
              });

              core.setFailed('Some validation checks failed');
            }
