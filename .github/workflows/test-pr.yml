name: Test PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # Basic validation checks
  validate:
    runs-on: ubuntu-latest
    outputs:
      has_php: ${{ steps.changed-files.outputs.has_php }}
      has_js: ${{ steps.changed-files.outputs.has_js }}
      has_docs: ${{ steps.changed-files.outputs.has_docs }}
      has_notion: ${{ steps.changed-files.outputs.has_notion }}
      has_root_scripts: ${{ steps.changed-files.outputs.has_root_scripts }}
      has_sidebar_promos: ${{ steps.changed-files.outputs.has_sidebar_promos }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed file types
        id: changed-files
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const names = files.map((f) => f.filename);
            const hasPhp = names.some((name) => name.endsWith('.php'));
            const hasJs = names.some((name) => ['.js', '.jsx', '.ts', '.tsx'].some((ext) => name.endsWith(ext)));
            const hasDocs = names.some((name) =>
              name.endsWith('.md') ||
              name.startsWith('docs/') ||
              ['AGENTS.md', 'README.md', 'CONTRIBUTING.md', 'Makefile', 'scripts/docs_truth_check.py'].includes(name)
            );
            const hasNotion = names.some((name) => name.startsWith('scripts/notion-to-wp/'));
            const hasRootScripts = names.some((name) =>
              name === 'scripts/wp_post_ia_rollout.py' ||
              name === 'scripts/public_image_audit.py' ||
              name.startsWith('scripts/tests/')
            );
            const hasSidebarPromos = names.some((name) => name.startsWith('plugins/kk-sidebar-promos/'));

            core.info(`Changed files: ${names.length}`);
            core.info(`has_php=${hasPhp} has_js=${hasJs} has_docs=${hasDocs} has_notion=${hasNotion} has_root_scripts=${hasRootScripts} has_sidebar_promos=${hasSidebarPromos}`);
            core.setOutput('has_php', hasPhp ? 'true' : 'false');
            core.setOutput('has_js', hasJs ? 'true' : 'false');
            core.setOutput('has_docs', hasDocs ? 'true' : 'false');
            core.setOutput('has_notion', hasNotion ? 'true' : 'false');
            core.setOutput('has_root_scripts', hasRootScripts ? 'true' : 'false');
            core.setOutput('has_sidebar_promos', hasSidebarPromos ? 'true' : 'false');

      - name: Check PR title format
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title;

            const validPrefixes = ['Fix:', 'Add:', 'Update:', 'Refactor:', 'Docs:', 'Chore:', 'Feature:'];
            const hasValidPrefix = validPrefixes.some(prefix => title.startsWith(prefix));

            if (!hasValidPrefix) {
              core.warning(`PR title should start with one of: ${validPrefixes.join(', ')}`);
            }

      - name: Check PR links to issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            const hasIssueLink = /(?:fixes|closes|resolves)\s+#\d+/i.test(body);

            if (!hasIssueLink) {
              core.warning('PR should link to an issue using "Fixes #123" or similar');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `⚠️ **Missing Issue Link**\n\nThis PR doesn't appear to link to an issue.\n\nPlease add a line like:\n- \`Fixes #123\`\n- \`Closes #456\`\n- \`Resolves #789\`\n\nThis ensures the issue is automatically closed when the PR is merged.`
              });
            }

  # WordPress/PHP validation
  php-validation:
    needs: validate
    runs-on: ubuntu-latest
    if: needs.validate.outputs.has_php == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install PHP validation dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: WordPress PHP validation
        run: make validate

      - name: KK Sidebar Promos smoke test
        if: needs.validate.outputs.has_sidebar_promos == 'true'
        run: php plugins/kk-sidebar-promos/tests/smoke.php

  # Notion publisher unit tests
  notion-tests:
    needs: validate
    runs-on: ubuntu-latest
    if: needs.validate.outputs.has_notion == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Notion publisher test dependencies
        run: pip install -r scripts/notion-to-wp/requirements.txt

      - name: Run Notion publisher unit tests
        run: python -m unittest discover -s scripts/notion-to-wp/tests -v

  # Root script unit tests
  root-script-tests:
    needs: validate
    runs-on: ubuntu-latest
    if: needs.validate.outputs.has_root_scripts == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install root script test dependencies
        run: pip install requests

      - name: Run root script unit tests
        run: python -m unittest discover -s scripts/tests -v

  # JavaScript/Node validation
  javascript-validation:
    needs: validate
    runs-on: ubuntu-latest
    if: needs.validate.outputs.has_js == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for package.json
        id: check-package
        run: |
          if [ -f "package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check-package.outputs.exists == 'true'
        run: npm install

      - name: Run linting
        if: steps.check-package.outputs.exists == 'true'
        run: |
          if grep -q '"lint"' package.json; then
            npm run lint || true
          fi

      - name: Run tests
        if: steps.check-package.outputs.exists == 'true'
        run: |
          if grep -q '"test"' package.json; then
            npm test || true
          fi

  # Documentation truth guardrails
  docs-truth-check:
    needs: validate
    runs-on: ubuntu-latest
    if: needs.validate.outputs.has_docs == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Check docs for stale current-state claims
        run: python3 scripts/docs_truth_check.py

  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Summarize all checks
  summary:
    needs: [validate, php-validation, notion-tests, root-script-tests, javascript-validation, docs-truth-check, security-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all validations passed
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const jobs = ${{ toJSON(needs) }};

            const allPassed = Object.values(jobs).every(job =>
              job.result === 'success' || job.result === 'skipped'
            );

            if (allPassed) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `✅ **All validation checks passed!**\n\nThis PR is ready for human review.`
              });
            } else {
              const failedJobs = Object.entries(jobs)
                .filter(([_, job]) => job.result === 'failure')
                .map(([name, _]) => name);

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `❌ **Some validation checks failed**\n\nFailed checks:\n${failedJobs.map(j => `- ${j}`).join('\n')}\n\nPlease fix the issues and push again.`
              });

              core.setFailed('Some validation checks failed');
            }
